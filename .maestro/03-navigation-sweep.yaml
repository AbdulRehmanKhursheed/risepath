appId: com.risepath.app
name: Full navigation sweep — every screen opens without crashing
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Continue.*|Choose your language.*|Noor"
    timeout: 60000
- tapOn:
    text: "Continue.*"
    optional: true
- tapOn:
    text: "Skip.*"
    optional: true
- assertVisible:
    id: "menu-button"

# Turn ads OFF first so no interstitial interrupts the sweep
- tapOn:
    id: "menu-button"
- scrollUntilVisible:
    element:
      text: "Show ads"
    direction: DOWN
    timeout: 20000
- tapOn: "Show ads"
- assertVisible: "Ads are off"
- back

# --- Prayers tab ---
- tapOn: "Prayers"
- back
- assertVisible:
    id: "menu-button"

# --- Every sidebar screen: open -> assert back home (a crash would break the chain) ---
# PRACTICE
- tapOn:
    id: "menu-button"
- scrollUntilVisible: { element: { text: "Tasbih Counter" }, direction: DOWN, timeout: 20000 }
- tapOn: "Tasbih Counter"
- takeScreenshot: screen-tasbih
- back
- assertVisible: { id: "menu-button" }

- tapOn: { id: "menu-button" }
